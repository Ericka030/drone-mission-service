name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flask pytest requests
    
    - name: Run tests
      run: |
        python -m pytest -v
    
    - name: Build Docker image (optional)
      run: |
        docker build -t drone-service .
    
    - name: Run Docker container test
      run: |
        docker run -d -p 5000:5000 --name test-container drone-service
        sleep 3
        curl -X POST http://localhost:5000/fly -H "Content-Type: application/json" -d '{"waypoints": [[1,2,3], [4,5,6]]}'
        docker stop test-container
        docker rm test-container