name: CI/CD Pipeline

# Trigger pipeline on push or pull request to main
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    # Step 1: Checkout your code
    - name: Checkout code
      uses: actions/checkout@v3

    # Step 2: Set up Python
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    # Step 3: Install Python dependencies
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flask pytest requests

    # Step 4: Run Python unit tests
    - name: Run tests
      run: |
        python -m pytest -v

    # Step 5: Build Docker image
    - name: Build Docker image
      run: docker build -t drone-service .

    # Step 6: Run Docker container
    - name: Run container
      run: docker run -d -p 5000:5000 --name test-container drone-service

    # Step 7: Wait until the service is up
    - name: Wait for service
      run: |
        for i in {1..10}; do
          curl -s http://localhost:5000/ && break
          echo "Waiting for service..."
          sleep 2
        done

    # Step 8: Test API endpoints
    - name: Test API endpoints
      run: |
        curl -f http://localhost:5000/status
        curl -f -X POST http://localhost:5000/mission \
          -H "Content-Type: application/json" \
          -d '{"waypoints": [[1,2,3],[4,5,6]]}'

    # Step 9: Cleanup container
    - name: Cleanup container
      run: |
        docker stop test-container
        docker rm test-container